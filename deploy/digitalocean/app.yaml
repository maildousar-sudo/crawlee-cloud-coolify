# DigitalOcean App Platform Spec - Crawlee Cloud
# Deploy: https://cloud.digitalocean.com/apps/new?repo=https://github.com/crawlee-cloud/crawlee-cloud

name: crawlee-cloud
region: nyc

services:
  - name: api
    dockerfile_path: docker/Dockerfile.api
    http_port: 3000
    instance_count: 1
    instance_size_slug: basic-s
    health_check:
      http_path: /v2/health
    routes:
      - path: /
    envs:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: '3000'
      - key: DATABASE_URL
        scope: RUN_TIME
        value: ${db.DATABASE_URL}
      - key: REDIS_URL
        scope: RUN_TIME
        value: ${redis.DATABASE_URL}
      - key: S3_ENDPOINT
        value: http://minio:9000
      - key: S3_ACCESS_KEY
        value: minioadmin
      - key: S3_SECRET_KEY
        type: SECRET
        value: REPLACE_ME
      - key: S3_BUCKET
        value: crawlee-cloud
      - key: S3_REGION
        value: us-east-1
      - key: S3_FORCE_PATH_STYLE
        value: 'true'
      - key: API_SECRET
        type: SECRET
        value: REPLACE_ME
      - key: ADMIN_EMAIL
        value: admin@crawlee.cloud
      - key: ADMIN_PASSWORD
        type: SECRET
        value: REPLACE_ME
      - key: CORS_ORIGINS
        value: ${APP_URL}

  - name: dashboard
    dockerfile_path: docker/Dockerfile.dashboard
    http_port: 3001
    instance_count: 1
    instance_size_slug: basic-s
    routes:
      - path: /dashboard
    envs:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: '3001'
      - key: NEXT_PUBLIC_API_URL
        value: ${APP_URL}

databases:
  - engine: PG
    name: db
    version: '16'
    size: db-s-1vcpu-1gb
    num_nodes: 1

  - engine: REDIS
    name: redis
    version: '7'
    size: db-s-1vcpu-1gb
    num_nodes: 1
